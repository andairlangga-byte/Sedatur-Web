
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEDATUR Rawamangun</title>

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:system-ui, Arial;
background:#0f172a;
color:#e5e7eb;
scroll-behavior:smooth;
}

/* ANIMASI MASUK */
.fade{
opacity:0;
transform:translateY(20px);
animation:fadeIn 0.8s forwards;
}

@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}

/* NAV */
nav{
position:sticky;
top:0;
background:#111827;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:12px;
border-bottom:1px solid #1f2937;
backdrop-filter: blur(10px);
}

nav a{
color:#e5e7eb;
text-decoration:none;
padding:8px 12px;
border-radius:10px;
font-size:14px;
transition:0.3s;
}

nav a:hover{
background:#1a73e8;
transform:scale(1.05);
}

/* HERO */
.hero{
text-align:center;
padding:70px 20px;
background:linear-gradient(135deg,#1a73e8,#0ea5e9);
animation:fadeIn 1s ease;
}

.hero h1{
margin:0;
font-size:34px;
}

.hero i{
font-size:30px;
margin-bottom:10px;
display:block;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px;
border:1px solid #1f2937;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
animation:fadeIn 0.6s ease;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.item{
background:#0b1220;
border-radius:12px;
overflow:hidden;
border:1px solid #1f2937;
transition:0.3s;
}

.item:hover{
transform:scale(1.05);
}

.item img{
width:100%;
height:160px;
object-fit:cover;
}

/* BUTTON */
button{
background:#1a73e8;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0f5bd3;
transform:scale(1.05);
}

/* ICON TEXT */
.icon{
margin-right:8px;
color:#60a5fa;
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
<a href="#home"><i class="fa fa-house icon"></i>Home</a>

<a href="#trip"><i class="fa fa-car icon"></i>Trip</a>
<a href="#galeri"><i class="fa fa-image icon"></i>Galeri</a>
<a href="#dukungan"><i class="fa fa-hand-holding-heart icon"></i>Dukungan</a>
<a href="#changelog"><i class="fa fa-clipboard icon"></i>Update</a>
</nav>

<!-- HERO -->
<div class="hero fade">
<i class="fa fa-users"></i>
<h1>SEDATUR Rawamangun</h1>
<p>Komunitas Anak Muda</p>
</div>

<section id="home" class="card fade">
<h2><i class="fa fa-home icon"></i>Home</h2>
<p>Isi deskripsi komunitas SEDATUR di sini.</p>
<button>Join Sekarang</button>
</section>

<!-- EVENT -->
<section id="event" class="card fade">
<h2><i class="fa fa-bolt icon"></i>Event</h2>
<p>Isi kegiatan / event komunitas di sini.</p>
</section>

<!-- TRIP -->
<section id="trip" class="card fade">
<h2><i class="fa fa-car icon"></i>Sedatur Trip</h2>
<p>Dokumentasi perjalanan komunitas.</p>
</section>

<!-- GALERI -->
<section id="galeri" class="card fade">

<div class="item"><img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644"></div>
<div class="item"><img src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac"></div>
</div>

</section>
