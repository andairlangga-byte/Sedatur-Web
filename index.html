<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEDATUR Rawamangun</title>

<style>
body{
margin:0;
font-family:system-ui, Arial;
background:#f5f7fb;
color:#111;
}

/* HERO */
.hero{
background:linear-gradient(135deg,#1a73e8,#4f9cff);
color:white;
padding:60px 20px;
text-align:center;
}

.hero h1{
margin:0;
font-size:32px;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

/* BUTTON */
button{
background:#1a73e8;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0f5bd3;
}

/* IFRAME DRIVE */
iframe{
width:100%;
height:500px;
border:0;
border-radius:12px;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>SEDATUR Rawamangun</h1>
<p>Komunitas Anak Muda</p>
</div>

<div class="container">

<!-- INTRO -->
<div class="card">
<h2>Selamat Datang</h2>
<p>Website resmi SEDATUR dengan dokumentasi kegiatan, meme, dan video komunitas.</p>
<button onclick="alert('Welcome SEDATUR!')">Join Sekarang</button>
</div>

<!-- FOTBAR -->
<div class="card">
<h2>📸 Dokumentasi Fotbar</h2>
<iframe src="https://drive.google.com/embeddedfolderview?id=1NtZHoSZDHIC4Islng850sSOEp2HeSkMt#grid"></iframe>
</div>

<!-- VIDEO JJ -->
<div class="card">
<h2>🎬 Video JJ Sedatur</h2>
<iframe src="https://drive.google.com/embeddedfolderview?id=1SP0qiWRx5ZagW9AmNc_wO4UD3SWXc2GU#grid"></iframe>
</div>

<!-- MEME -->
<div class="card">
<h2>😂 Meme Sedatur</h2>
<iframe src="https://drive.google.com/embeddedfolderview?id=1NIOfbGa8okYtY-GHXfArePq2vRbQdJ_F#grid"></iframe>
</div>

<!-- TRIP -->
<div class="card">
<h2>🚗 Sedatur Trip</h2>
<iframe src="https://drive.google.com/embeddedfolderview?id=1blBoDaakAzuj-HF0eo-LC4KQDeQANtDL#grid"></iframe>
</div>

</div>

</body>
</html>
